[workspace]
members = [
    "crates/webui-expressions",
    "crates/webui-ffi",
    "crates/webui-handler",
    "crates/webui-parser",
    "crates/webui-protocol",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Microsoft Edge"]
license = "MIT"
repository = "https://github.com/microsoft/webui"

[workspace.dependencies]
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.12"
anyhow = "1.0"
log = "0.4"
env_logger = "0.11.6"
async-trait = "0.1"
tokio = { version = "1.44.1", features = ["full"] }

# Testing
criterion = "0.5.1"
mockall = "0.13.1"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
debug = false

[profile.dev]
opt-level = 0
