[workspace]
members = [
    "crates/webui-cli",
    "crates/webui-expressions",
    "crates/webui-ffi",
    "crates/webui-handler",
    "crates/webui-parser",
    "crates/webui-protocol",
    "xtask",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Microsoft Edge"]
license = "MIT"
repository = "https://github.com/microsoft/webui"

[workspace.dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
anyhow = "1.0.101"
log = "0.4.29"
env_logger = "0.11.9"
async-trait = "0.1.89"
tokio = { version = "1.49.0", features = ["full"] }
clap = { version = "4", features = ["derive"] }
console = "0.15"
prost = "0.13"

# Test dependencies
criterion = "0.8.2"
mockall = "0.14.0"
tempfile = "3.25.0"
tokio-test = "0.4.5"

# Build dependencies
prost-build = "0.13"

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true
debug = false

[profile.dev]
opt-level = 0
