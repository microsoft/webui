name: PR Checks

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Phase 1: Lint (fast, fail-fast) ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: License headers
        run: cargo xtask license-headers

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Deny (licenses & advisories)
        run: |
          cargo install --locked cargo-deny || true
          cargo deny check

  # ── Phase 2: Test (Ubuntu) ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace

  # ── Phase 2: Build (Linux + macOS + Windows matrix) ─────────────────
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace
        run: cargo build --workspace --exclude xtask

      - name: Build examples
        run: cargo xtask build-examples

      - name: Build docs
        run: pnpm --filter @webui/docs build

  # ── Phase 2: Build + E2E (Ubuntu) ───────────────────────────────
  build-e2e:
    name: Build + E2E (Ubuntu)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace
        run: cargo build --workspace --exclude xtask

      - name: Build examples
        run: cargo xtask build-examples

      - name: Build docs
        run: pnpm --filter @webui/docs build

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: cargo xtask e2e

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: examples/app/*/test-results/
          retention-days: 7

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-snapshots
          path: examples/app/*/tests/*.spec.ts-snapshots/
          retention-days: 7

  # ── Phase 2: WASM (Ubuntu) ─────────────────────────────────────────
  wasm:
    name: WASM
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-wasm
