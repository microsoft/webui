name: Test Large Runners (Temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-large:
    name: macOS Large
    runs-on: macos-latest-large
    steps:
      - name: Check runner
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          uname -a

  windows-large:
    name: Windows Large
    runs-on: windows-latest-large
    steps:
      - name: Check runner
        run: |
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Runner Arch: $env:RUNNER_ARCH"
          systeminfo | Select-String "OS Name","System Type"

  ubuntu-large:
    name: Ubuntu Large
    runs-on: ubuntu-latest-large
    steps:
      - name: Check runner
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Runner Arch: $RUNNER_ARCH"
          uname -a
