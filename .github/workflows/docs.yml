name: Deploy GitHub Pages

permissions:
  contents: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - 'packages/webui-press/**'
      - 'crates/webui-parser/**'
      - 'crates/webui-handler/**'
      - 'crates/webui-protocol/**'
      - 'crates/webui-node/**'
      - 'packages/webui/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

      - name: Build webui-press
        run: cargo build -p microsoft-webui-press --release

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest
          run_install: false

      - name: Install Dependencies
        run: pnpm install

      - name: Build Docs
        run: cd docs && pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
