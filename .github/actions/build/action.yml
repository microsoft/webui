name: Build WebUI
description: Shared build steps for WebUI — installs protoc, Rust, Node.js, pnpm, and optionally .NET.

inputs:
  shared-cache-key:
    description: Rust cache shared key for cross-job cache sharing
    required: false
    default: ''
  cache-on-failure:
    description: Save Rust cache even when subsequent steps fail
    required: false
    default: 'false'
  rust-targets:
    description: Comma-separated list of extra Rust targets to install (e.g. aarch64-unknown-linux-gnu)
    required: false
    default: ''
  rust-components:
    description: Comma-separated list of extra Rust components to install (e.g. clippy, rustfmt)
    required: false
    default: ''
  dotnet:
    description: Install .NET SDK (set to version like '8.0.x' to enable)
    required: false
    default: ''
  protoc-version:
    description: Protobuf compiler version to install
    required: false
    default: '29.5'
  skip-build:
    description: Skip cargo build and build-examples steps
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Disable Windows Defender on build dirs
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
        Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"

    - name: Install protoc (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

    - name: Install protoc (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install protobuf

    - name: Install protoc (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $version = "${{ inputs.protoc-version }}"
        $url = "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip"
        $zip = "$env:RUNNER_TEMP\protoc.zip"
        $dest = "$env:RUNNER_TEMP\protoc"
        Invoke-WebRequest -Uri $url -OutFile $zip
        Expand-Archive -Path $zip -DestinationPath $dest -Force
        echo "$dest\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        echo "PROTOC=$dest\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.93
        targets: ${{ inputs.rust-targets }}
        components: ${{ inputs.rust-components }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-cache-key }}
        cache-on-failure: ${{ inputs.cache-on-failure }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: pnpm install

    - name: Setup .NET
      if: inputs.dotnet != ''
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet }}

    - name: Build workspace
      if: inputs.skip-build != 'true'
      shell: bash
      run: cargo build --workspace --exclude xtask

    - name: Build examples
      if: inputs.skip-build != 'true'
      shell: bash
      run: cargo xtask build-examples
