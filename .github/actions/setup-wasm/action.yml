name: 'Setup and Build WASM'
description: 'Install WASM toolchain, build webui-wasm, and verify output'

runs:
  using: 'composite'
  steps:
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.93
        targets: wasm32-unknown-unknown

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Install wasm-pack and protoc
      shell: bash
      run: |
        cargo install wasm-pack
        sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler

    - name: Build WASM
      shell: bash
      run: cargo xtask build-wasm

    - name: Verify WASM output
      shell: bash
      run: |
        for variant in all handler parser; do
          test -f "docs/.webui-press/public/wasm/${variant}/webui_wasm_${variant}_bg.wasm"
          test -f "docs/.webui-press/public/wasm/${variant}/webui_wasm_${variant}.js"
          ! grep -q "from 'env'" "docs/.webui-press/public/wasm/${variant}/webui_wasm_${variant}.js"
        done
