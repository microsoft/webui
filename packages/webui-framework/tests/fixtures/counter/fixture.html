<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Counter Fixture</title>
</head>
<body>
  <test-counter label="Clicks">
    <template shadowrootmode="open">
      <span class="label"><!--w-b:start:0:label-->Clicks<!--w-b:end:0:label--></span>:
      <span class="count"><!--w-b:start:1:count-->0<!--w-b:end:1:count--></span>
      (<span class="doubled"><!--w-b:start:2:doubled-->0<!--w-b:end:2:doubled--></span>)
      <button class="inc" data-ev="0">+</button>
      <button class="dec" data-ev="1">-</button>
    </template>
  </test-counter>
  <script src="/dist/counter/element.js"></script>
</body>
</html>
