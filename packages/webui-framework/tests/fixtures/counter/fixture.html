<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Counter Fixture</title>
</head>
<body>
  <test-counter label="Clicks"><span class="label">Clicks</span>:
      <span class="count">0</span>
      (<span class="doubled">0</span>)
      <button class="inc">+</button>
      <button class="dec">-</button>
</test-counter>
  <script src="/dist/counter/element.js"></script>
</body>
</html>
