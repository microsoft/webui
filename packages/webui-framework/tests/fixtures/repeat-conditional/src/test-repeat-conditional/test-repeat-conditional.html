<div class="controls">
  <button class="load" @click="{loadItems()}">Load</button>
  <button class="switch" @click="{switchItems()}">Switch</button>
  <span class="selected-title">{{selectedTitle}}</span>
</div>
<ul class="items">
  <for each="item in items">
    <li>
      <if condition="item.activeClass == 'active'">
        <p class="current" data-href="{{item.href}}">{{item.title}}</p>
      </if>
      <if condition="item.activeClass != 'active'">
        <button class="link" data-href="{{item.href}}" ?disabled="{{item.disabled}}" @click="{selectItem(item.title)}">{{item.title}}</button>
      </if>
    </li>
  </for>
</ul>
