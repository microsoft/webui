<span class="greeting">{{greeting}}</span>, <span class="name">{{name}}</span>!
<span class="count">{{count}}</span> (<span class="doubled">{{doubled}}</span>)
<button class="inc" @click="{increment()}">+</button>
<button class="dec" @click="{decrement()}">-</button>
<button class="reset" @click="{onReset()}">Reset</button>
<input class="text-input" @input="{onInput(e)}" @keydown="{onKeydown(e)}" />
<span class="last-key">{{lastKey}}</span>
<span class="input-value">{{inputValue}}</span>
