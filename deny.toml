[advisories]
ignore = [
    # bincode 1.x (transitive dep of syntect) — unmaintained but no security issue
    "RUSTSEC-2025-0141",
    # yaml-rust (transitive dep of serde_yaml) — unmaintained, no security issue
    "RUSTSEC-2024-0320",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
skip = [
    { name = "anstream" },
    { name = "anstyle-parse" },
    { name = "convert_case" },
    { name = "getrandom" },
    { name = "hashbrown" },
    { name = "http" },
    { name = "r-efi" },
    { name = "socket2" },
    { name = "serde_spanned" },
    { name = "toml" },
    { name = "toml_datetime" },
    { name = "windows-sys" },
]
