[advisories]
ignore = [
    { id = "RUSTSEC-2026-0007", reason = "transitive dep via tokio; awaiting upstream bytes fix" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
