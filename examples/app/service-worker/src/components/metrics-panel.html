<section class="card metrics-card">
  <p class="eyebrow">{{label}}</p>
  <h2>{{title}}</h2>
  <div class="metrics">
    <for each="metric in metrics">
      <article class="metric">
        <strong>{{metric.value}}</strong>
        <span>{{metric.label}}</span>
      </article>
    </for>
  </div>
</section>
