<div class="media">
  <if condition="imageUrl">
    <img
      src="{{imageUrl}}?w={{proxyWidth}}&q=75"
      alt="{{alt}}"
      width="{{proxyWidth}}"
      height="{{proxyHeight}}"
      loading="{{loading}}"
      decoding="{{decoding}}"
      fetchpriority="{{fetchPriority}}"
    />
  </if>
</div>
