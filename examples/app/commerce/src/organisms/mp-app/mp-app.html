<template shadowrootmode="open">
  <mp-navbar
    store-name="{{storeName}}"
    cart-item-count="{{cartItemCount}}"
    search-query="{{searchQuery}}"
    cart-href="{{cartHref}}"
  ></mp-navbar>
  <mp-mobile-menu search-query="{{searchQuery}}"></mp-mobile-menu>

  <div class="content-shell {{shellClass}}">
    <if condition="showCatalogNav">
      <aside class="catalog-sidebar">
        <mp-category-nav
          all-active-class="{{catalogAllActiveClass}}"
          current-label="{{catalogCurrentLabel}}"
          :categories="{{catalogCategories}}"
        ></mp-category-nav>
      </aside>
    </if>

    <main class="route-surface">
      <route path="/" name="home" component="mp-page-home" exact />
      <route path="/search" name="search" component="mp-page-search" exact />
      <route path="/search/:category" name="category" component="mp-page-search" exact />
      <route path="/product/:handle" name="product" component="mp-page-product" exact />
      <route path="/about" name="about" component="mp-page-about" exact />
      <route path="/terms-conditions" name="terms" component="mp-page-terms" exact />
      <route path="/shipping-return-policy" name="shipping" component="mp-page-shipping" exact />
      <route path="/privacy-policy" name="privacy" component="mp-page-privacy" exact />
      <route path="/frequently-asked-questions" name="faq" component="mp-page-faq" exact />
    </main>
  </div>

  <mp-cart-panel
    subtotal="{{cartSubtotal}}"
    taxes="{{cartTaxes}}"
    cart-open="{{cartOpen}}"
    cart-close-href="{{cartCloseHref}}"
    current-path="{{currentPath}}"
    :cart-empty="{{cartEmpty}}"
    :cart-items="{{cartItems}}"
  ></mp-cart-panel>

  <mp-footer></mp-footer>
</template>
