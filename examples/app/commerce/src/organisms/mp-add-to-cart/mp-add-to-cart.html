<form class="add-to-cart-form" action="/cart/add" method="post" @submit="{onSubmit(e)}">
  <input type="hidden" name="handle" value="{{handle}}" />
  <input type="hidden" name="color" value="{{selectedColor}}" />
  <input type="hidden" name="size" value="{{selectedSize}}" />
  <input type="hidden" name="redirectTo" value="{{currentPath}}" />
  <input type="hidden" name="openCart" value="true" />
  <if condition="canSubmit">
    <button class="add-to-cart-btn" type="submit">Add To Cart</button>
  </if>
  <if condition="!canSubmit">
    <button class="add-to-cart-btn" type="submit" disabled>Add To Cart</button>
  </if>
</form>
