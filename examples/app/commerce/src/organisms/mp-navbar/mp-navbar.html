<template shadowrootmode="open">
  <nav class="navbar">
    <div class="left">
      <button class="hamburger" data-action="open-menu" aria-label="Open mobile menu" @click="{onMenuClick()}">
        <svg class="hamburger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <path d="M4 6h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 18h16"></path>
        </svg>
      </button>
      <a href="/" class="logo-link" @click="{onNavigateClick(e)}">
        <div class="logo-square">
          <svg
            class="logo-mark"
            xmlns="http://www.w3.org/2000/svg"
            aria-label="Acme Store logo"
            viewBox="0 0 32 28"
          >
            <path d="M21.5758 9.75769L16 0L0 28H11.6255L21.5758 9.75769Z"></path>
            <path d="M26.2381 17.9167L20.7382 28H32L26.2381 17.9167Z"></path>
          </svg>
        </div>
        <span class="store-name">ACME STORE</span>
      </a>
      <ul class="nav-links">
        <li><a href="/search" class="nav-link" @click="{onNavigateClick(e)}">All</a></li>
        <for each="cat in navCategories">
          <li><a href="/search/{{cat.handle}}" class="nav-link" @click="{onNavigateClick(e)}">{{cat.title}}</a></li>
        </for>
      </ul>
    </div>
    <div class="center">
      <mp-search-bar
        query="{{searchQuery}}"
        action="/search"
        placeholder="Search for products..."
        label="Search for products"
      ></mp-search-bar>
    </div>
    <div class="right">
      <a href="{{cartHref}}" class="cart-btn" aria-label="Open cart" @click="{onCartClick(e)}">
        <svg
          class="cart-icon"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          aria-hidden="true"
          data-slot="icon"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
          ></path>
        </svg>
        <if condition="cartItems.length">
          <span class="cart-badge">{{cartItems.length}}</span>
        </if>
      </a>
    </div>
  </nav>
</template>
