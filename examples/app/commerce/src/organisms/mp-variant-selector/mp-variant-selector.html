<div class="variants">
  <for each="group in optionGroups">
    <dl class="option-group">
      <dt class="option-name">{{group.name}}</dt>
      <dd class="option-values">
        <for each="opt in group.values">
          <button class="pill" ?active="{{opt.value == group.selected}}" data-group="{{group.name}}" data-value="{{opt.value}}"
            ?disabled="{{opt.unavailable}}" @click="{onVariantClick(e)}">
            {{opt.value}}
          </button>
        </for>
      </dd>
    </dl>
  </for>
</div>
