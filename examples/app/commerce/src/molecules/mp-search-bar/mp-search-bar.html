<form class="search-form" action="{{action}}" method="get" @submit="{onSubmit(e)}">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
    <circle cx="11" cy="11" r="8"></circle>
    <path d="m21 21-4.35-4.35"></path>
  </svg>
  <input class="search-input" type="text" name="q" value="{{query}}" placeholder="{{placeholder}}" autocomplete="off"
    @input="{onInput(e)}"
    aria-label="{{label}}" />
</form>
