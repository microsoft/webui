<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{storeName}}</title>
  <meta name="description" content="High-performance SSR marketplace powered by WebUI and Rust." />
  <link rel="dns-prefetch" href="https://cdn.shopify.com" />
  <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
  <style>
    @layer reset, theme, layout;

    @layer reset {

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        -webkit-text-size-adjust: 100%;
        tab-size: 4;
        line-height: 1.5;
      }

      body {
        line-height: inherit;
        -webkit-font-smoothing: antialiased;
      }

      img,
      svg,
      video {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: inherit;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }

      ol,
      ul {
        list-style: none;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-size: inherit;
        font-weight: inherit;
      }
    }

    @layer theme {
      :root {
        --webui-bg: #171717;
        --webui-surface: #262626;
        --webui-surface-hover: #404040;
        --webui-surface-alt: #1a1a1a;
        --webui-elevated: #333;
        --webui-text: #fafafa;
        --webui-text-secondary: #a1a1a1;
        --webui-text-muted: #a3a3a3;
        --webui-accent: #2563eb;
        --webui-accent-hover: #3b82f6;
        --webui-accent-subtle: color-mix(in oklch, #2563eb 15%, transparent);
        --webui-border: #262626;
        --webui-border-strong: #525252;
        --webui-success: #4caf50;
        --webui-danger: #e53935;
        --webui-radius-sm: 0.25rem;
        --webui-radius-md: 0.375rem;
        --webui-radius-lg: 0.5rem;
        --webui-radius-xl: 0.75rem;
        --webui-radius-full: 9999px;
        --webui-font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        color-scheme: dark;
      }
    }

    @layer layout {
      html {
        font-family: var(--webui-font);
        background: var(--webui-bg);
        color: var(--webui-text);
      }

      body {
        min-height: 100vh;
      }

      ::selection {
        background: color-mix(in oklch, var(--webui-accent) 40%, transparent);
      }
    }

    @view-transition {
      navigation: auto;
    }

    /* View transition: cross-fade pages with a subtle slide */
    ::view-transition-old(page-content) {
      animation: 200ms ease-out both fade-out, 200ms ease-out both slide-to-left;
    }

    ::view-transition-new(page-content) {
      animation: 300ms ease-in both fade-in, 300ms ease-in both slide-from-right;
    }

    /* Going "back" reverses direction via browser heuristic */
    ::view-transition-old(product-image) {
      animation: 250ms ease-out both fade-out;
      z-index: 1;
    }

    ::view-transition-new(product-image) {
      animation: 350ms cubic-bezier(0.2, 0, 0.2, 1) both fade-in;
      z-index: 2;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
      }
    }

    @keyframes fade-out {
      to {
        opacity: 0;
      }
    }

    @keyframes slide-from-right {
      from {
        transform: translateX(30px);
      }
    }

    @keyframes slide-to-left {
      to {
        transform: translateX(-30px);
      }
    }
  </style>
</head>

<body>
  <route path="/" component="mp-app">
    <route path="" component="mp-page-home" exact />
    <route path="search" component="mp-page-search">
      <route path="" component="mp-product-grid" exact />
      <route path=":category" component="mp-product-grid" exact />
    </route>
    <route path="product/:handle" component="mp-page-product" exact />
    <route path="about" component="mp-page-about" exact />
    <route path="terms-conditions" component="mp-page-terms" exact />
    <route path="shipping-return-policy" component="mp-page-shipping" exact />
    <route path="privacy-policy" component="mp-page-privacy" exact />
    <route path="frequently-asked-questions" component="mp-page-faq" exact />
  </route>
  <script src="/index.js" type="module"></script>
</body>

</html>
