<template shadowrootmode="open">
  <div class="search-layout">
    <section class="search-main">
      <if condition="query != '' && resultsCount == 0">
        <p class="empty-results">
          There are no products that match "{{query}}"
        </p>
      </if>

      <if condition="query == '' || resultsCount != 0">
        <mp-product-grid :products="{{products}}"></mp-product-grid>
      </if>
    </section>

    <aside class="search-sidebar">
      <mp-filter-list :sort-options="{{sortOptions}}"></mp-filter-list>
    </aside>
  </div>
</template>
