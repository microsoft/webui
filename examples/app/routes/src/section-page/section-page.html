<template shadowrootmode="open">

  <div class="section-header">
    <h2><span class="icon">{{sectionIcon}}</span>{{sectionName}}</h2>
  </div>

  <div class="topics">
    <for each="topic in topics">
      <a href="/sections/{{id}}/topics/{{topic.id}}">{{topic.name}}</a>
    </for>
  </div>

  <div class="outlet-area">
    <outlet />
  </div>
</template>
