<!DOCTYPE html>
<html dir="{{textdirection}}" lang="{{language}}">

<head>
  <meta charset="utf-8">
  <title>{{title}}</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px;
      background: #f5f5f5;
      color: #1a1a1a;
    }
  </style>
</head>

<body>
  <todo-app title="{{title}}">
    <for each="item in items">
      <todo-item
        id="{{item.id}}"
        title="{{item.title}}"
        state="{{item.state}}"
      ></todo-item>
    </for>
  </todo-app>

  <script type="module" src="/index.js"></script>
</body>

</html>
