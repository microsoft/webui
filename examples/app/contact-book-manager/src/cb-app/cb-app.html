<template shadowrootmode="open"
  @search-change="{onSearch(e)}"
  @select-contact="{onSelectContact(e)}"
  @edit-contact="{onEditContact(e)}"
  @delete-contact="{onDeleteContactEvent(e)}"
  @toggle-favorite="{onToggleFavoriteEvent(e)}"
  @go-back="{onBack()}"
  @form-save="{onFormSaveEvent(e)}"
  @form-cancel="{onFormCancel()}"
>
  <cb-header search-query="{{searchQuery}}"></cb-header>

  <div class="layout">
    <cb-sidebar
      page="{{page}}"
      active-group="{{activeGroup}}"
      total-contacts="{{totalContacts}}"
      total-favorites="{{totalFavorites}}"
      :groups="{{groups}}"
    ></cb-sidebar>

    <main class="content">
      <outlet />
    </main>
  </div>
</template>
