<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Pattern</title>
    <style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
        margin: 0;
    }
    #wrapper {
        width: 960px;
        height: 720px;
        position: relative;
        background-color: white;
    }
    .tile {
        position: absolute;
        width: 10px;
        height: 10px;
        background-color: #333;
    }
    </style>
</head>
<body>
    <div id="wrapper">
        <for each="tile in tiles">
            <div class="tile" style="left: {{tile.left}}; top: {{tile.top}};"></div>
        </for>
    </div>
</body>
</html>
